<div id="header"></div>

<main>
    <div class="container">
        <div class="left">
            <p class="watching">You're Watching:</p>
            <hr>
            <h1 id="title"></h1>
            <span id="date"></span><br>
            <div class="author"><span id="author"></span> Reporting</div>
            <a id="link" target="_blank"></a>
            <div class="stats">
                <span class="views">
                    <img src="/x/images/main/views.png" alt="views icon">
                    <span id="views">...</span>
                </span>
                <span class="likes" id="likes-button">
                    <img src="/x/images/main/likes.png" alt="likes icon">
                    <span id="likes">...</span>
                </span>
            </div>
            <hr>
            <div class="sponsored">
                <div class="note">sponsored:</div><br>
            </div>
                <img class="advertisement" src="/x/images/main/sponsored1.png" alt="advertisement">
        </div>
        <div class="right">
            <br><br>
            <div id="contents"></div>
        </div>
    </div>
    <br>
    <div class="more-articles">
        <a id="next-link">
            <img class="next" src="/x/images/main/next.png" alt="next">
        </a>
        <div id="related-feed"></div>
    </div>
    <div style="display: none;">
        <span id="tags"></span>
        <span id="category"></span>
    </div>
    <div class="seperator">
        <hr>
    </div>
</main>

<div id="footer"></div>
<script src="/x/app.js"></script>
